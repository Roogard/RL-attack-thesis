# RL attacker training config — RAG victim.
# Matches the design in plans/i-currently-have-most-optimized-lamport.md.

# ── data ────────────────────────────────────────────────────────────────
data_path: LongMemEval/data/longmemeval_s_cleaned.json
split_path: configs/splits/rag_attack.json   # produced by scripts/make_split.py
cache_path: results/caches/train_clean_cache.pkl

# ── victim ──────────────────────────────────────────────────────────────
architecture_name: "RAG with all-MiniLM-L6-v2 embedder, round-level chunks, top_k=10"
domain: "a personal assistant that stores multi-session conversations with one user"
embed_model: all-MiniLM-L6-v2
top_k: 10
answer_batch_size: 8

# ── attacker ────────────────────────────────────────────────────────────
attacker_model_id: Qwen/Qwen2.5-3B-Instruct
lora_rank: 16
memory_read_access: true            # false => blind-attacker ablation
n_poison: 3                         # budget N (sweep 1,3,5,10 later)
max_new_tokens: 768                 # per-session generation budget

# ── training ────────────────────────────────────────────────────────────
group_size: 16                      # G in GRPO (chunked logprob backward lets this fit)
max_steps: 2000
lr: 1.0e-5
weight_decay: 0.0
grad_clip: 1.0
diversity_buffer_size: 512
seed: 0

# ── logging / checkpoints ───────────────────────────────────────────────
output_dir: results/rl_attacker/rag_v1
log_every: 10
ckpt_every: 500

# ── Stage B corpus pipeline (attacks/hubness/stage_b_corpus.py) ────────
corpora:
  root: data/corpora
  ids:
    - nl_web
    - nl_memory
    - nl_persona
    - synth_generic
    - synth_topic
    - synth_persona
    - adv_inject
    - adv_confuse
    - adv_optimized

fitness:
  alpha: 1.0          # weight on cos_to_hub (normalized within per-hub top-N)
  beta: 1.0           # weight on RPR (normalized within per-hub top-N)
  top_n: 200          # per-hub candidate pool size to RPR-rerank
  scoring_pool_size: 10
  scoring_pool_split: val
  scoring_pool_seed: 0
  scoring_pool_path: results/stage_b_corpus/scoring_pool.pkl
